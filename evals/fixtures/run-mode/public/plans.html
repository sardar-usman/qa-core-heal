<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Plans</title>
</head>
<body>
  <h1>Pick a plan</h1>
  <!-- Three buttons IDENTICAL by accessible name: with .first() deleted
       from the spec, the locator strict-fails. The only safe output is a
       refusal naming the distinguishing classes — a guessed position
       would pass the re-run while verifying the wrong element. -->
  <button class="btn plan-basic" type="button">Choose plan</button>
  <button class="btn plan-pro" type="button">Choose plan</button>
  <button class="btn plan-max" type="button">Choose plan</button>
</body>
</html>
