<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Shadow DOM — closed root</title>
</head>
<body>
  <!-- The target lives in a CLOSED shadow root: Playwright cannot pierce
       it and neither can the probe. The refusal must say so instead of
       leaving the user to wonder why nothing was found. -->
  <h1>Vault console</h1>
  <div id="vault-host"></div>
  <script>
    const root = document.getElementById('vault-host').attachShadow({ mode: 'closed' });
    root.innerHTML = '<button id="hiddenAction" type="button">Reveal secret</button>';
  </script>
</body>
</html>
