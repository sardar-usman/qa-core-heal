<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Normalization — content</title>
</head>
<body>
  <!-- "content" IS the whole id of #content and only a sub-token of
       #footer-content: exact identifier equality must beat containment,
       not tie with it. -->
  <main id="content">Main article body.</main>
  <footer id="footer-content">Copyright note.</footer>
</body>
</html>
